name: GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    permissions:
      pages: write
      contents: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v1
        with:
          path: .
      - uses: actions/deploy-pages@v1
